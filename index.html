<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIS Design Portal</title>
  <meta name="description" content="Hospital Information System — Tài liệu thiết kế module chức năng">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>
  <div id="app">Đang tải...</div>

  <script>
    window.$docsify = {
      name: '<span class="nav-logo">HIS Design</span>',
      repo: '',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      loadNavbar: '_navbar.md',
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm kiếm tài liệu...',
        noData: 'Không tìm thấy kết quả',
        depth: 4,
        hideOtherSidebarContent: false,
      },

      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            return content;
          });
          hook.doneEach(function() {
            // Thêm badge tự động cho từng subsystem
            document.querySelectorAll('code').forEach(function(el) {
              var text = el.textContent.trim();
              var badges = { 'MOS': 'badge-mos', 'EMR': 'badge-emr', 'LIS': 'badge-lis', 'ACS': 'badge-acs', 'FSS': 'badge-fss' };
              if (badges[text] && el.parentElement.tagName === 'P') {
                el.classList.add('subsystem-badge', badges[text]);
              }
            });
          });
        }
      ],

      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md'
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="assets/js/custom.js"></script>
</body>
</html>
